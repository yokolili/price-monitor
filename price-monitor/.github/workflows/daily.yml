name: 每日价格更新与部署

on:
  push:
    branches: [main]
  schedule:
    # 每天 UTC 01:00 = 北京时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 采集今日数据
        run: cd scripts && python3 fetch.py

      - name: 回填历史
        run: cd scripts && python3 backfill.py 365

      - name: 生成静态站点
        run: cd scripts && python3 build.py

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
