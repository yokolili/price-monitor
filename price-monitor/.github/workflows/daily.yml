name: 每日价格更新与部署

on:
  schedule:
    # 每天 UTC 01:00 = 北京时间 09:00 运行
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python3 --version
          pip3 install --quiet requests

      - name: 执行采集脚本（获取今日实时数据）
        run: cd scripts && python3 fetch.py

      - name: 回填历史（首次运行或补全缺失日期）
        run: cd scripts && python3 backfill.py 365

      - name: 生成静态站点
        run: cd scripts && python3 build.py

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
